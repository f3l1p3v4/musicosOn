version: '3.8'

services:
  postgres:
    container_name: musicoson-pg
    image: bitnami/postgresql
    restart: always
    environment:
      - POSTGRESQL_USERNAME=postgres
      - POSTGRESQL_PASSWORD=docker
      - POSTGRESQL_DATABASE=musicoson
    volumes:
      - pgdata:/bitnami/postgresql
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    container_name: musicoson-backend
    restart: always
    env_file: .env
    depends_on:
      - postgres
    ports:
      - "3333:3333"

  frontend:
    build: ./frontend
    container_name: musicoson-frontend
    restart: always
    depends_on:
      - backend
    command: ["npm", "run", "build"]

  nginx:
    image: nginx:alpine
    container_name: musicoson-nginx
    restart: always
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/dist:/usr/share/nginx/html
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
